[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
evm_version = "cancun"
optimizer = true
optimizer_runs = 200
via_ir = false
verbosity = 2
gas_reports = ["IntentAuction", "Executor", "IntentRegistry", "SolverAuction"]
fs_permissions = [{ access = "read-write", path = "./deployments" }]

[fuzz]
runs = 1000
max_test_rejects = 65536
seed = "0x42"

[invariant]
runs = 64
depth = 32
fail_on_revert = false
call_override = false

[rpc_endpoints]
sepolia = "${SEPOLIA_RPC_URL}"
mainnet = "${MAINNET_RPC_URL}"

[etherscan]
sepolia = { key = "${ETHERSCAN_API_KEY}", chain = 11155111 }
